const legEl=document.getElementById('leg');
const tabsEl=document.getElementById('tabs');

const TLABELS=['1. Adoption anxiety','2. Push forces','3. Switching cost','4. Finance vs IT','5. Urgency & risk','6. Comp data moat'];

function buildTabs(){
  TLABELS.forEach((l,i)=>{
    const b=document.createElement('button');
    b.className='tb'+(i===0?' on':'');
    b.textContent=l;
    b.onclick=()=>show(i);
    tabsEl.appendChild(b);
  });
}

function xe(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function show(i){
  cur=i;
  tabsEl.querySelectorAll('.tb').forEach((b,j)=>b.classList.toggle('on',j===i));
  draw(CHARTS[i]);
}

function draw(ch){
  hdEl.textContent=ch.title;
  axEl.textContent=ch.axisNote;
  cqEl.textContent='CIQ EPM: '+ch.ciqNote;

  const used=[...new Set(ch.pts.map(p=>p.c))];
  const order=['ciq','mid','leg','lite','sheet','comp'];
  legEl.innerHTML=order.filter(c=>used.includes(c)).map(c=>`<span class="leg-item"><span class="leg-dot" style="background:${C[c].fill};border:1.5px solid ${C[c].stroke};"></span><span>${C[c].label}</span></span>`).join('');

  svgEl.setAttribute('viewBox',`0 0 ${VW} ${VH}`);

  const nonCiq=ch.pts.filter(p=>p.c!=='ciq');
  const ciqPts=ch.pts.filter(p=>p.c==='ciq');

  let s='';
  s+=`<rect x="0" y="0" width="${VW}" height="${VH}" fill="#ffffff"/>`;
  s+=`<rect x="${PX}" y="${PY}" width="${PW}" height="${PH}" fill="#f4f3ef" rx="2"/>`;
  s+=`<line x1="${MX}" y1="${PY}" x2="${MX}" y2="${PY+PH}" stroke="rgba(0,0,0,0.13)" stroke-width="0.8" stroke-dasharray="4,4"/>`;
  s+=`<line x1="${PX}" y1="${MY}" x2="${PX+PW}" y2="${MY}" stroke="rgba(0,0,0,0.13)" stroke-width="0.8" stroke-dasharray="4,4"/>`;
  s+=`<line x1="${PX}" y1="${PY+PH}" x2="${PX+PW}" y2="${PY+PH}" stroke="rgba(0,0,0,0.38)" stroke-width="1.2"/>`;
  s+=`<line x1="${PX}" y1="${PY}" x2="${PX}" y2="${PY+PH}" stroke="rgba(0,0,0,0.38)" stroke-width="1.2"/>`;
  s+=`<polygon points="${PX+PW},${PY+PH-5} ${PX+PW+9},${PY+PH} ${PX+PW},${PY+PH+5}" fill="rgba(0,0,0,0.38)"/>`;
  s+=`<polygon points="${PX-5},${PY} ${PX},${PY-9} ${PX+5},${PY}" fill="rgba(0,0,0,0.38)"/>`;
  s+=`<text x="${PX+5}" y="${PY+PH+16}" font-size="10" fill="#9b9b98" font-family="-apple-system,sans-serif">${xe(ch.xL)}</text>`;
  s+=`<text x="${PX+PW-5}" y="${PY+PH+16}" font-size="10" fill="#9b9b98" font-family="-apple-system,sans-serif" text-anchor="end">${xe(ch.xH)}</text>`;
  s+=`<text transform="translate(${PX-14},${PY+PH-4}) rotate(-90)" font-size="10" fill="#9b9b98" font-family="-apple-system,sans-serif" text-anchor="start">${xe(ch.yL)}</text>`;
  s+=`<text transform="translate(${PX-14},${PY+8}) rotate(-90)" font-size="10" fill="#9b9b98" font-family="-apple-system,sans-serif" text-anchor="end">${xe(ch.yH)}</text>`;
  const qfs=8.5;
  s+=`<text x="${PX+6}" y="${MY-6}" font-size="${qfs}" fill="rgba(0,0,0,0.2)" font-family="-apple-system,sans-serif">${xe(ch.ql[0])}</text>`;
  s+=`<text x="${PX+PW-6}" y="${MY-6}" font-size="${qfs}" fill="rgba(0,0,0,0.2)" font-family="-apple-system,sans-serif" text-anchor="end">${xe(ch.ql[1])}</text>`;
  s+=`<text x="${PX+6}" y="${MY+14}" font-size="${qfs}" fill="rgba(0,0,0,0.2)" font-family="-apple-system,sans-serif">${xe(ch.ql[2])}</text>`;
  s+=`<text x="${PX+PW-6}" y="${MY+14}" font-size="${qfs}" fill="rgba(0,0,0,0.2)" font-family="-apple-system,sans-serif" text-anchor="end">${xe(ch.ql[3])}</text>`;

  [...nonCiq,...ciqPts].forEach(p=>{
    const cx2=sx(p.x),cy2=sy(p.y);
    const cat=C[p.c];
    const isCiq=p.c==='ciq';
    const off=cat.r+6;
    const lx=p.la==='left'?cx2-off:cx2+off;
    const ta=p.la==='left'?'end':'start';
    s+=`<g class="pt" data-name="${xe(p.n)}" data-tip="${xe(p.t)}">`;
    if(isCiq){s+=`<circle cx="${cx2}" cy="${cy2}" r="18" fill="#97C459" fill-opacity="0.13"/>`;}
    s+=`<circle cx="${cx2}" cy="${cy2}" r="${cat.r}" fill="${cat.fill}" stroke="${cat.stroke}" stroke-width="${isCiq?2.2:1.5}" style="cursor:pointer;"/>`;
    const fc=isCiq?'#2d5a0e':'#1a1a18';
    const fw=isCiq?'600':'400';
    const fs=isCiq?'11':'10';
    s+=`<text x="${lx}" y="${cy2+4}" font-size="${fs}" fill="${fc}" font-weight="${fw}" font-family="-apple-system,sans-serif" text-anchor="${ta}">${xe(p.n)}</text>`;
    s+=`</g>`;
  });

  svgEl.innerHTML=s;

  const wrap=svgEl.parentElement;
  svgEl.querySelectorAll('.pt').forEach(g=>{
    const circ=[...g.querySelectorAll('circle')].pop();
    circ.addEventListener('mouseenter',e=>{
      const wr=wrap.getBoundingClientRect();
      const x=e.clientX-wr.left,y=e.clientY-wr.top;
      tipEl.innerHTML=`<strong style="font-size:12px;color:#1a1a18;">${g.dataset.name}</strong><br><span style="color:#6b6b68;font-size:11px;">${g.dataset.tip}</span>`;
      const tW=220;
      const left=wr.width-x>tW+24?x+14:x-tW-14;
      tipEl.style.left=Math.max(0,left)+'px';
      tipEl.style.top=(y+14)+'px';
      tipEl.style.display='block';
    });
    circ.addEventListener('mouseleave',()=>{tipEl.style.display='none';});
  });
}

buildTabs();
draw(CHARTS[0]);
</script>
